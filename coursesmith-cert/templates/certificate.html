<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate of Completion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #0a0e1a;
    --bg-deep:       #06080f;
    --glass:         rgba(20, 26, 42, 0.60);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-default:rgba(255, 255, 255, 0.12);
    --border-strong: rgba(255, 255, 255, 0.22);
    --text-primary:  #f5f7fb;
    --text-secondary:#b8c2d6;
    --text-muted:    #7682a0;
    /* ACCENT - swap these three per book */
    --accent:        {{ACCENT_COLOR}};
    --accent-dim:    {{ACCENT_DIM}};
    --accent-glow:   {{ACCENT_GLOW}};
    --W: 1200px;
    --H: 800px;
    --font-sys: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace;
  }

  /* Light theme overrides. Renderer sets <html data-theme="light"> to activate. */
  :root[data-theme="light"] {
    --bg:            #f6f7fb;
    --bg-deep:       #e8ecf3;
    --glass:         rgba(255, 255, 255, 0.70);
    --border-subtle: rgba(10, 14, 26, 0.06);
    --border-default:rgba(10, 14, 26, 0.12);
    --border-strong: rgba(10, 14, 26, 0.22);
    --text-primary:  #0a0e1a;
    --text-secondary:#3a4459;
    --text-muted:    #6b7591;
    --accent:        {{ACCENT_COLOR_LIGHT}};
    --accent-dim:    {{ACCENT_DIM_LIGHT}};
    --accent-glow:   {{ACCENT_GLOW_LIGHT}};
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: var(--W);
    height: var(--H);
    overflow: hidden;
    background: var(--bg);
  }
  body {
    font-family: var(--font-sys);
    color: var(--text-primary);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .blooms {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 55% 60% at 10% 10%, rgba(76, 124, 240, 0.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 90% 5%,  rgba(138, 92, 220, 0.08) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 100%,rgba(124, 240, 200, 0.05) 0%, transparent 70%),
      radial-gradient(ellipse 35% 55% at 95% 60%, rgba(108, 80, 200, 0.07) 0%, transparent 65%);
  }
  /* Soften the body blooms on light, mirroring the course light-mode treatment */
  :root[data-theme="light"] .blooms {
    background:
      radial-gradient(ellipse 55% 60% at 10% 10%, rgba(76, 124, 240, 0.05) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 90% 5%,  rgba(138, 92, 220, 0.04) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 100%,rgba(124, 240, 200, 0.03) 0%, transparent 70%),
      radial-gradient(ellipse 35% 55% at 95% 60%, rgba(108, 80, 200, 0.04) 0%, transparent 65%);
  }
  .accent-bloom {
    position: absolute;
    width: 600px;
    height: 260px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -38%);
    background: radial-gradient(ellipse 70% 60% at 50% 60%, var(--accent-dim) 0%, transparent 80%);
    pointer-events: none;
    z-index: 1;
    opacity: 0.6;
  }
  .plaque {
    position: relative;
    z-index: 10;
    width: calc(var(--W) - 100px);
    height: calc(var(--H) - 80px);
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-default);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 40px 72px 38px;
    overflow: hidden;
  }
  /* On light, compensate for lost translucency-on-dark depth with a soft drop shadow */
  :root[data-theme="light"] .plaque {
    box-shadow: 0 1px 3px rgba(10,14,26,0.05), 0 8px 32px rgba(10,14,26,0.08);
  }
  .plaque::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent-glow), transparent);
  }
  .plaque::after {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    pointer-events: none;
  }
  .deco-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .header {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .issuer-mark {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .issuer-name {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .completed-pill {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    border-radius: 999px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px 3px var(--accent-glow);
    flex-shrink: 0;
  }
  .body {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex: 1;
    justify-content: center;
  }
  .cert-label {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .cert-heading {
    font-family: var(--font-sys);
    font-weight: 600;
    font-size: 58px;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 30px;
  }
  .rule {
    width: 480px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border-strong), transparent);
    margin-bottom: 30px;
  }
  .certifies-label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .recipient-name {
    font-family: var(--font-sys);
    font-weight: 600;
    font-size: 68px;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 14px;
    /* Long-name safety: shrink rather than overflow the plaque */
    max-width: 940px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .name-rule {
    width: 360px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin-bottom: 26px;
    box-shadow: 0 0 14px 3px var(--accent-glow);
  }
  .completed-label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .book-title {
    font-family: var(--font-sys);
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: var(--text-secondary);
    text-align: center;
    max-width: 800px;
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .book-author {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-align: center;
  }
  .footer {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 100%;
    border-top: 1px solid var(--border-subtle);
    padding-top: 22px;
  }
  .footer-block {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .footer-block.right {
    align-items: flex-end;
  }
  .footer-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .footer-value {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
  }
  .footer-seal {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .footer-seal .seal-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
</style>
</head>
